name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libsodium-dev libssl-dev

      - name: Build (sanity)
        run: make sanity

      - name: Build
        run: make build

      - name: Smoke test
        run: |
          echo "hello" > sample.txt
          ./CyberShield sample.txt
          test -s sample.txt.enc
          ls -l sample.txt sample.txt.enc
